name: awx-ee

on:
  push:
    branches:
      - "main"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.LOCAL_GITHUB_TOKEN }}
      - name: Build local image for scanning
        uses: docker/build-push-action@v7
        with:
          context: awx-ee/
          platforms: linux/amd64
          load: true
          tags: local/awx-ee:scan
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local/awx-ee:scan
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: awx-ee/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            davralin/awx-ee:latest
            ghcr.io/davralin/awx-ee:latest
      - name: Sign images with Cosign
        run: |
          cosign sign --yes ghcr.io/davralin/awx-ee@${{ steps.build.outputs.digest }}
          cosign sign --yes docker.io/davralin/awx-ee@${{ steps.build.outputs.digest }}
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/davralin/awx-ee@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-spdx.json
      - name: Attest SBOM
        run: |
          cosign attest --yes --type spdxjson \
            --predicate sbom-spdx.json \
            ghcr.io/davralin/awx-ee@${{ steps.build.outputs.digest }}
          cosign attest --yes --type spdxjson \
            --predicate sbom-spdx.json \
            docker.io/davralin/awx-ee@${{ steps.build.outputs.digest }}
